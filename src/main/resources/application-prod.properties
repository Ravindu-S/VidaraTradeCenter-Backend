# Database Configuration for Railway (PostgreSQL)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Actuator Health Checks (Crucial for Railway)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Server Port (Railway usually handles this via PORT env var, but good to be explicit if needed)
server.port=${PORT:8080}

# File Uploads (Ensure this path exists or is writable in the container)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
file.upload-dir=/tmp/uploads

# Logging
logging.level.root=INFO
logging.level.com.vidara=DEBUG